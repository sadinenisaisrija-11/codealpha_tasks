<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-Commerce Store</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <h2>My Store</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="#cart-count">Cart</a></li>
        </ul>
    </nav>

    <!-- Header -->
    <header>
        <h1>Welcome to My E-Commerce Store</h1>
        <p>Best Products at Best Prices</p>
    </header>

    <h2 class="title">Featured Products</h2>

    <!-- Products Section -->
    <div class="products">

        <!-- Mobile -->
        <div class="card">
            <img src="images/mobile.jpg" alt="Mobile">

            <h3>
                <a href="product.html">Mobile</a>
            </h3>

            <p>₹15,000</p>

            <button onclick="addToCart('Mobile')">
                Add to Cart
            </button>
        </div>

        <!-- Laptop -->
        <div class="card">
            <img src="images/laptop.jpg" alt="Laptop">

            <h3>
                <a href="product.html">Laptop</a>
            </h3>

            <p>₹50,000</p>

            <button onclick="addToCart('Laptop')">
                Add to Cart
            </button>
        </div>

        <!-- Smart Watch -->
        <div class="card">
            <img src="images/watch.jpg" alt="Watch">

            <h3>
                <a href="product.html">Smart Watch</a>
            </h3>

            <p>₹3,000</p>

            <button onclick="addToCart('Smart Watch')">
                Add to Cart
            </button>
        </div>

        <!-- Shoes -->
        <div class="card">
            <img src="images/shoes.jpg" alt="Shoes">

            <h3>
                <a href="product.html">Shoes</a>
            </h3>

            <p>₹1,500</p>

            <button onclick="addToCart('Shoes')">
                Add to Cart
            </button>
        </div>

    </div>

    <!-- Cart Counter -->
    <h2 id="cart-count">Cart Items: 0</h2>

    <!-- Cart Section -->
    <div class="cart-box">
        <h2>Your Cart</h2>

        <ul id="cart-items">

        </ul>
    </div>

    <!-- Place Order Button -->
    <div style="text-align:center; margin:20px;">
        <button onclick="placeOrder()">
            Place Order
        </button>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 My E-Commerce Store | CodeAlpha Project</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
